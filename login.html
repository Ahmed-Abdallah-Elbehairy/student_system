<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Student Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #ff4757;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            animation: shake 0.5s;
        }

        .success-message {
            background: #2ed573;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>🎓 Student Management System</h1>
        <h2>تسجيل الدخول</h2>

        <div id="messageBox"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
            </div>

            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
            </div>

            <button type="submit" class="login-btn">دخول</button>
        </form>
    </div>

    <script>

        const allowedUsers = [
            { username: 'admin', password: '123456', fullName: 'Admin User' },
            { username: 'ahmed', password: '123456', fullName: 'Ahmed abdallah' },
            { username: 'yousef', password: '123456', fullName: 'Yousef Eid' }
        ];


        window.addEventListener('load', function () {
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                window.location.href = 'index.php';
            }
        });


        const loginForm = document.getElementById('loginForm');
        const messageBox = document.getElementById('messageBox');

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;


            if (!username || !password) {
                showMessage('⚠️ يرجى ملء جميع الحقول', 'error');
                return;
            }


            const user = allowedUsers.find(u => u.username === username && u.password === password);

            if (user) {

                const userData = {
                    username: user.username,
                    fullName: user.fullName,
                    loginTime: new Date().toISOString()
                };

                localStorage.setItem('loggedInUser', JSON.stringify(userData));

                showMessage('✅ تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');


                setTimeout(() => {
                    window.location.href = 'index.php';
                }, 1000);

            } else {
                showMessage('❌ اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
            }
        });


        function showMessage(message, type) {
            const className = type === 'error' ? 'error-message' : 'success-message';
            messageBox.innerHTML = `<div class="${className}">${message}</div>`;


            if (type === 'error') {
                setTimeout(() => {
                    messageBox.innerHTML = '';
                }, 5000);
            }
        }
    </script>
</body>

</html>
